; ClaudeRoboEyes - PlatformIO Proje Konfigürasyonu
; ESP32 + Nokia 5110 (PCD8544) LCD — 84x48 piksel, SPI
;
; Kurulum:
;   1. PlatformIO IDE'yi VSCode veya Cursor'a kur
;   2. Bu klasörü PlatformIO projesi olarak aç
;   3. "PlatformIO: Upload" ile ESP32'ye yükle

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

lib_deps =
    adafruit/Adafruit PCD8544 Nokia 5110 LCD library @ ^2.0.1
    adafruit/Adafruit GFX Library @ ^1.11.9
    https://github.com/FluxGarage/RoboEyes.git

monitor_speed = 115200
