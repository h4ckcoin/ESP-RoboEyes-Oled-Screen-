; ClaudeRoboEyes - PlatformIO Proje Konfigürasyonu
; ESP32 + SSD1306 OLED (I2C) — 128x64 piksel
;
; Kurulum:
;   1. PlatformIO IDE'yi Cursor'a kur
;   2. Bu klasörü PlatformIO projesi olarak aç
;   3. "PlatformIO: Upload" ile ESP32'ye yükle

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

lib_deps =
    adafruit/Adafruit SSD1306 @ ^2.5.9
    adafruit/Adafruit GFX Library @ ^1.11.9
    https://github.com/FluxGarage/RoboEyes.git

monitor_speed = 115200
